#########################################################################################
# HYPRLAND CONFIGURATION
#########################################################################################

################
### MONITORS ###
################
# Leaves the monitor setup to auto-detect the best resolution and refresh rate
monitor=,preferred,auto,auto

###################
### MY PROGRAMS ###
###################
# Define variables for your most used apps so you only have to change them in one place
$terminal = kitty
$fileManager = kitty -e yazi  # Opens the Yazi terminal file manager inside Kitty
$menu = rofi -show drun       # App launcher
$browser = brave              # Default web browser

#################
### AUTOSTART ###
#################
# Background processes that must start when Hyprland boots up
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP &
exec-once = waybar &          # Starts your top status bar
exec-once = hyprpaper &       # Starts your wallpaper daemon
exec-once = nm-applet &       # Starts the network/Wi-Fi tray icon
exec-once = $browser &        # Auto-launches Brave on boot
exec-once = $terminal &       # Auto-launches Kitty on boot
exec-once = sleep 2 && /usr/lib/polkit-kde-authentication-agent-1 & # Handles admin password prompts (GUI)

#############################
### ENVIRONMENT VARIABLES ###
#############################
# Ensures your mouse cursor stays a consistent size across all apps
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 1             # Space between windows
    gaps_out = 0 1 1 1      # Space between windows and monitor edge (Top, Right, Bottom, Left)
    border_size = 2         # Thickness of the window borders
    
    # Border colors: A nice gradient for the active window, grey for inactive
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    
    resize_on_border = false # Disables dragging window edges with the mouse
    allow_tearing = false    # Keep false to prevent screen tearing
    layout = dwindle         # The default tiling layout engine
}

decoration {
    rounding = 10            # How rounded the window corners are
    rounding_power = 2
    
    active_opacity = 1.0     # 1.0 means solid/opaque. Lower it (e.g., 0.9) for transparency
    inactive_opacity = 1.0
    
    shadow {
        enabled = true       # Draws a drop shadow under windows
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    
    blur {
        enabled = true       # Blurs the background behind transparent windows
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes

    # A sharp, direct curve with absolutely ZERO bounce/hesitation
    bezier = rapid, 0.0, 0.5, 0.0, 1.0

    # Target, Enabled, Speed (Lowered from 1.5 to 0.8), Curve, Style
    animation = windows, 1, 0.8, rapid, slide
    animation = windowsOut, 1, 0.8, rapid, slide
    animation = border, 1, 1, default
    animation = fade, 1, 0.5, default
    animation = workspaces, 1, 0.8, rapid, slide
}

dwindle {
    pseudotile = true       # Allows a tiled window to float at its native size if needed
    preserve_split = true   # Keeps your window layout from breaking when you close an app
}

misc {
    force_default_wallpaper = -1  # Disables the default anime mascot wallpaper
    disable_hyprland_logo = false # Disables the startup logo
}

#############
### INPUT ###
#############
input {
    kb_layout = us          # Standard US keyboard layout
    follow_mouse = 1        # Window focus follows your mouse cursor
    sensitivity = 0         # Mouse speed modification (0 means no change)
    touchpad {
        natural_scroll = false # Set to true if you want Mac-style two-finger scrolling
    }
}

gesture = 3, horizontal, workspace # Swipe 3 fingers left/right on touchpad to change workspaces

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER # Sets the Windows/Super key as your main modifier

# --- Core Applications ---
bind = $mainMod, Return, exec, $terminal   # Win + Enter => Launch Kitty
bind = $mainMod, Space, exec, $menu        # Win + Space => Launch Rofi menu
bind = $mainMod, E, exec, $fileManager     # Win + E     => Launch Yazi
bind = $mainMod, B, exec, $browser         # Win + B     => Launch Brave

# --- Window Management ---
bind = $mainMod, Q, killactive,            # Win + Q     => Close current window
bind = $mainMod SHIFT, Q, exit,            # Win + Shift + Q => Emergency kill Hyprland session
bind = $mainMod, V, togglefloating,        # Win + V     => Make window float/un-float
bind = $mainMod, F, fullscreen,            # Win + F     => Make window cover the whole screen
bind = $mainMod, P, pseudo,                # Win + P     => Toggle pseudotiling

# --- System Controls ---
bind = $mainMod, Escape, exec, wlogout     # Win + Esc   => Open the power/logout menu

# --- Move Focus (Arrow Keys & Vim HJKL) ---
# Use Win + Arrows OR Win + H,J,K,L to switch which window you are typing in
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# --- Workspaces (1-10) ---
# Switch to a different virtual desktop
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# --- Move Window to Workspace ---
# Grab the active window and throw it to a different virtual desktop
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --- Special Workspace (Scratchpad) ---
# A hidden, temporary workspace for quickly stashing apps
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# --- Tabbed Window Groups ---
# Stack windows on top of each other like web browser tabs to save space
bind = $mainMod, G, togglegroup,              # Win + G => Group/Ungroup the current window
bind = ALT, Tab, changegroupactive, f         # Alt + Tab => Next tab in group
bind = ALT SHIFT, Tab, changegroupactive, b   # Alt + Shift + Tab => Previous tab in group

# --- Mouse Controls ---
bind = $mainMod, mouse_down, workspace, e+1   # Scroll down on desktop to switch workspace
bind = $mainMod, mouse_up, workspace, e-1     # Scroll up on desktop to switch workspace
bindm = $mainMod, mouse:272, movewindow       # Win + Left Click & Drag => Move floating window
bindm = $mainMod, mouse:273, resizewindow     # Win + Right Click & Drag => Resize floating window

# --- Media & Screenshots ---
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy  # PrtScn => Snip tool (copies to clipboard)
bind = $mainMod, Print, exec, grim - | wl-copy        # Win + PrtScn => Full screen screenshot

# Laptop hardware keys for volume and brightness control
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Laptop hardware keys for media playback
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOW RULES ###
##############################
# These rules force specific apps to behave in certain ways

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize # Stops apps from taking over the whole screen unexpectedly
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true # Fixes a bug where older X11 apps steal focus while dragging
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes # Forces the hyprland-run prompt to float in the bottom left corner
}
